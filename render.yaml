services:
  - type: web
    name: telllmeeesechs
    runtime: python
    buildCommand: pip install -U pip && pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /ping
    envVars:
      - key: USE_WEBHOOK
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

